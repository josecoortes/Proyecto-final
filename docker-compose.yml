services:
  workspace:
    build: .
    container_name: entorno_trabajo
    volumes:
      - .:/var/www/html  # Lo que hagas dentro, aparecerá en tu Windows
    ports:
      - "8001:8000"      # Puerto para Laravel
      - "4200:4200"      # Puerto para Angular
    command: bash -c "sed -i 's/\r$//' /var/www/html/docker-entrypoint.sh && bash /var/www/html/docker-entrypoint.sh"
    depends_on:
      - db

  # La base de datos (requisito de Laravel)
  db:
    image: mysql:8.0
    container_name: base_datos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proyecto_db
    ports:
      - "3306:3306"